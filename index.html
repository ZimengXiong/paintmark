  <style>

    .promise{display:flex;align-items:center;gap:7px;padding-left:14px;border-left:1px solid var(--line);font-size:12px;color:var(--muted)}.promise:before{content:"";width:6px;height:6px;border-radius:50%;background:#2b9b62;box-shadow:0 0 0 3px #dff2e7}
    .top-actions{display:flex;align-items:center;gap:7px;margin-left:auto}.button{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:0 12px;border:1px solid var(--line-strong);border-radius:7px;background:var(--paper);color:var(--ink);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .15s,border-color .15s,transform .15s}.button:hover{background:#f0efeb;border-color:#aaa8a2}.button:active{transform:translateY(1px)}.button.primary{border-color:var(--accent);background:var(--accent);color:#fff}.button.primary:hover{background:#174ebc}.button.icon{width:34px;padding:0}.button svg{width:15px;height:15px}.github-label{margin-left:6px}

    .pane{display:grid;grid-template-rows:41px 1fr;min-width:0;min-height:0}.pane-head{display:flex;align-items:center;gap:8px;padding:0 15px;border-bottom:1px solid var(--line);background:var(--chrome);color:var(--muted);font-size:11px;font-weight:650;letter-spacing:.035em;text-transform:uppercase}.pane-head .meta{margin-left:auto;font-weight:500;letter-spacing:0;text-transform:none;color:#8a9097}

    #settings{position:fixed;z-index:40;top:56px;right:0;bottom:0;width:min(390px,100vw);overflow:auto;padding:0 22px 28px;background:var(--chrome);border-left:1px solid var(--line);box-shadow:-18px 0 45px #25282d1a;transform:translateX(102%);transition:transform .22s ease}#settings.open{transform:none}

    @media(max-width:680px){body{grid-template-rows:54px 1fr}.topbar{gap:8px;padding:0 10px}.brand{font-size:14px}.mark{width:24px;height:28px}.view-switch{display:flex;margin-left:auto}.top-actions{margin-left:0}.top-actions .button:not(.primary):not(#settingsBtn){display:none}.button{min-height:32px;padding:0 10px}.button.primary{font-size:0}.button.primary:after{content:"PDF";font-size:11px}#workspace{display:block;position:relative}.pane{position:absolute;inset:0}.pane-head{height:39px}#workspace[data-mobile-view="editor"] #previewShell,#workspace[data-mobile-view="preview"] #editorPane{display:none}#editorPane{border-right:0}#editorPane textarea{padding:22px 20px 70px;font-size:12px}#previewPane{padding:18px 10px 60px}.mkd-page-wrap{margin-bottom:16px}#settings{top:54px;width:100%;border-left:0}#settingsBackdrop{inset:54px 0 0}.setting{grid-template-columns:1fr 165px}}

    .setting input[type=range]{display:block;width:100%;margin:0}.setting input[type=checkbox]{justify-self:end;margin-right:5px}
    .font-upload{display:block;width:100%}.font-upload .button{width:100%;height:34px}
    #resetBtn{height:36px;margin-top:10px}
    @media(max-width:1100px){.setting{grid-template-columns:minmax(118px,1fr) minmax(138px,1.05fr)}.setting select{width:100%}}
    @media(max-width:680px){.setting{grid-template-columns:minmax(112px,.9fr) minmax(138px,1.1fr);gap:10px}#settings fieldset,#settings fieldset:first-of-type{padding-inline:14px}}
  </style>
  <style>
    .topbar,#workspace,#settings,.settings-head{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
    #workspace{background:#c9cbcb;box-shadow:inset 0 1px 4px #34383d16!important}
    .pane,#editorPane,#settings{background:#eeefec!important;box-shadow:inset 0 1px 2px #ffffffa0,0 8px 22px #34383c12!important}
    .pane-head,.settings-head{background:#e7e8e5!important;box-shadow:inset 0 -1px 2px #353a3f10!important}
    #previewPane{background:#c9cbcb;contain:strict}
    .mkd-page-wrap{contain:layout paint;isolation:isolate}.mkd-page{backface-visibility:hidden;-webkit-font-smoothing:antialiased}
    #settings{padding:0 10px 18px;overscroll-behavior:contain}
    .settings-head{top:0;min-height:40px;height:40px;margin:0 -10px 6px;padding:0 14px;border-radius:13px 13px 0 0}
    .settings-head .button{width:26px;min-height:26px;padding:0;border-radius:7px}
    #settings fieldset,#settings fieldset:first-of-type{margin:0;padding:17px 16px 18px;background:transparent!important;border-radius:0;box-shadow:none!important}
    #settings legend{margin-bottom:12px;color:#70767b;font-size:10px;letter-spacing:.06em}
    .setting{margin:4px 0;min-height:35px}
    .setting select,.font-upload .button{background:#f8f8f5!important;box-shadow:inset 0 1px 1px #fff,inset 0 -1px 3px #34393e10!important}
    #resetBtn{margin:8px 16px 0;width:calc(100% - 32px);background:#f8f8f5!important}
  </style>
  <style>
    :root{--lean-bg:#c8caca;--lean-pane:#f1f2ef;--lean-head:#e9eae7;--lean-control:#fafaf7;--lean-ink:#25282c;--lean-muted:#6f7479}
    body{grid-template-rows:48px 1fr;padding:0 8px 8px;background:var(--lean-bg);transition:grid-template-columns .14s ease}
    body.settings-open{grid-template-columns:320px minmax(0,1fr);column-gap:8px}
    .topbar{align-self:center;height:34px;padding:0 9px;border-radius:9px!important;background:var(--lean-head)!important;box-shadow:inset 0 1px 1px #fff9!important}
    .brand{font-size:15px}.top-actions{gap:4px}.button{min-height:27px;padding:0 9px;border-radius:6px!important;background:var(--lean-control)!important;box-shadow:none!important;font-size:11px}.button.primary{background:#292c30!important}.button.icon{width:27px}
    #workspace{grid-template-columns:minmax(300px,38%) minmax(0,1fr);gap:8px;padding:8px;border-radius:11px!important;background:#bec0c0!important;box-shadow:inset 0 1px 3px #34383d12!important}
    .pane,#editorPane,#settings{border-radius:8px!important;background:var(--lean-pane)!important;box-shadow:inset 0 1px 1px #fff9!important}
    .pane{grid-template-rows:34px 1fr}.pane-head,.settings-head{height:34px;min-height:34px;background:var(--lean-head)!important;box-shadow:none!important;color:var(--lean-muted);font-size:11px}
    .pane-head{padding:0 11px}#editorPane textarea{padding:20px 21px 64px;background:#f8f8f5!important;font-size:12px;line-height:1.58}
    #previewPane{padding:18px 16px 52px;background:#bec0c0}.mkd-page-wrap{margin-bottom:16px}.mkd-page{border-radius:1px!important;box-shadow:0 3px 12px #34383c20!important}
    #settings{width:320px;padding:0 8px 14px;transition:transform .14s ease,visibility 0s linear .14s;box-shadow:inset 0 1px 1px #fff9!important}
    #settings.open{transition:transform .14s ease,visibility 0s}.settings-head{margin:0 -8px 3px;padding:0 11px;border-radius:8px 8px 0 0!important}.settings-head .button{width:23px;min-height:23px;padding:0}
    #settings fieldset,#settings fieldset:first-of-type{padding:12px 11px 13px}.setting{grid-template-columns:112px minmax(0,1fr);min-height:30px;gap:9px;margin:2px 0;font-size:11px}
    #settings legend{margin-bottom:7px;font-size:9px;letter-spacing:.05em}.setting select{height:28px;padding:0 25px 0 8px;border-radius:6px!important;font-size:11px}.range-wrap{grid-template-columns:minmax(0,1fr) 36px;gap:5px}.range-wrap output{width:36px;font-size:10px}.setting input[type=checkbox]{width:14px;height:14px;margin-right:4px}.font-upload .button{height:28px;font-size:11px}
    #resetBtn{width:calc(100% - 22px);height:29px;margin:5px 11px 0}
    @media(max-width:1100px){body.settings-open{grid-template-columns:300px minmax(0,1fr)}#settings{width:300px}.setting{grid-template-columns:104px minmax(0,1fr)}}
    @media(max-width:680px){body{grid-template-rows:48px 1fr;padding:0 5px 5px}body.settings-open{grid-template-columns:calc(100vw - 10px) 0}#workspace{padding:5px}.pane{inset:5px}#settings{width:calc(100vw - 10px)}.setting{grid-template-columns:112px minmax(0,1fr)}}
  </style>
  <style>
    :root{--retro-edge:#969a9c;--retro-edge-soft:#b7babc;--retro-text:#292d31;--retro-muted:#62686d;--retro-blue:#1769cc}
    body{background:linear-gradient(#bfc2c4,#aeb2b4);color:var(--retro-text)}
    .topbar{background:linear-gradient(#f8f8f7 0%,#e9eae8 47%,#d9dbda 50%,#d0d2d1 100%)!important;border:1px solid var(--retro-edge)!important;border-top-color:#cfd1d1!important;box-shadow:inset 0 1px #fff,0 1px 2px #3c41464a!important;border-radius:7px!important}
    .brand{color:#25292d;text-shadow:0 1px #fff;font-weight:600}.top-actions{gap:5px}
    .button,.setting select,.font-upload .button{border:1px solid #a6aaac!important;background:linear-gradient(#fff,#eeeeec 48%,#dedfdd 52%,#d4d6d4)!important;box-shadow:inset 0 1px #fff,0 1px 1px #52575b24!important;color:#303438;text-shadow:0 1px #fff;border-radius:5px!important}
    .button:hover,.setting select:hover{background:linear-gradient(#fff,#f4f4f2 48%,#e5e6e4 52%,#dcdedc)!important}.button:active{background:linear-gradient(#cfd1d0,#e7e8e6)!important;box-shadow:inset 0 1px 2px #555a5e40!important}
    .button.primary{border-color:#0c4d9f!important;background:linear-gradient(#5ca8f5 0%,#2b82df 47%,#1769cc 50%,#0c58b7 100%)!important;box-shadow:inset 0 1px #9ed0ff,0 1px 1px #30394340!important;color:#fff;text-shadow:0 -1px #08427f}.button.primary:hover{background:linear-gradient(#6eb2f7 0%,#388ce4 47%,#2175d3 50%,#1262bf 100%)!important}
    #workspace{background:#aeb2b4!important;border:1px solid #8d9295!important;box-shadow:inset 0 1px 3px #50565b45!important;border-radius:8px!important}
    .pane,#editorPane,#settings{background:#f2f2f0!important;border:1px solid #969b9e!important;box-shadow:inset 0 1px #fff,0 1px 2px #4b515536!important;border-radius:6px!important}
    .pane-head,.settings-head{background:linear-gradient(#f5f5f3,#e2e3e1 49%,#d4d6d4 51%,#cacdcb)!important;border-bottom:1px solid #9da1a3!important;box-shadow:inset 0 1px #fff!important;color:var(--retro-muted);text-shadow:0 1px #fff}
    #editorPane textarea{background:#fbfbf9!important;color:#30353a}
    #previewPane{background:linear-gradient(#b8bcbe,#adb1b3)}.mkd-page{box-shadow:0 2px 8px #343a3e4a!important}
    #settings{background:#e8e9e7!important}.settings-head{border-radius:5px 5px 0 0!important}
    #settings fieldset,#settings fieldset:first-of-type{border:0!important;border-bottom:1px solid #c4c7c7!important;box-shadow:0 1px #fff!important}#settings fieldset:last-of-type{border-bottom:0!important;box-shadow:none!important}
    #settings legend{color:#596066;text-shadow:0 1px #fff;font-weight:600}.setting{color:#34393d}
    .range-wrap output{color:#697075;text-shadow:0 1px #fff}.setting input[type=range],.setting input[type=checkbox]{accent-color:var(--retro-blue)}
    #resetBtn{border-color:#a7aaac!important}
    .view-switch{border:1px solid #9fa3a5!important;background:#cfd2d1!important;box-shadow:inset 0 1px 2px #5a60654a!important;border-radius:6px}.view-switch button{border-radius:4px}.view-switch button.active{background:linear-gradient(#fff,#dedfdd);box-shadow:0 1px 1px #4c51562e}
    #dropHint{position:fixed;z-index:100;inset:56px 16px 16px;display:grid;place-items:center;border:2px dashed #2d6eb7;border-radius:9px;background:#dceaf8e8;color:#245d9e;font-size:14px;font-weight:600;text-shadow:0 1px #fff;opacity:0;pointer-events:none;transition:opacity .1s}.folder-dragging #dropHint{opacity:1}
    @media(max-width:680px){#openFolderBtn{display:inline-flex!important}#dropHint{inset:48px 8px 8px}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">paintdown</a>
    <div class="view-switch" aria-label="Mobile workspace view"><button type="button" data-view-target="editor">Write</button><button type="button" class="active" data-view-target="preview">Preview</button></div>
    <nav class="top-actions" aria-label="Document actions">
      <button class="button" id="openFolderBtn" type="button">Open folder</button>
      <input id="folderInput" type="file" webkitdirectory multiple hidden aria-label="Open a Markdown folder">
      <a class="button" href="https://github.com/ZimengXiong/paintdown">GitHub</a>
      <button class="button" id="settingsBtn" type="button" aria-expanded="false" aria-controls="settings">Tune</button>
      <button class="button" id="htmlBtn" type="button">Export HTML</button>
      <button class="button primary" id="pdfBtn" type="button">Download PDF</button>
    </nav>
  </header>

  <main id="workspace" data-mobile-view="preview">
    <section class="pane" id="editorPane" aria-label="Markdown editor">
      <div class="pane-head"><span>Markdown</span></div>
      <textarea id="editor" spellcheck="false" aria-label="Markdown source"></textarea>
    </section>
    <section class="pane" id="previewShell" aria-label="Document preview">
      <div class="pane-head"><span>Typeset preview</span><span class="meta" id="status" aria-live="polite">Rendering…</span></div>
      <div id="previewPane"></div>
    </section>
  </main>

  <div id="dropHint" aria-hidden="true">Drop a Markdown folder</div>

  <div id="settingsBackdrop" aria-hidden="true"></div>
  <aside id="settings" aria-label="Rendering settings" aria-hidden="true">
    <div class="settings-head"><h2>Settings</h2><button class="button icon" id="settingsClose" type="button" aria-label="Close settings">×</button></div>
    <fieldset><legend>Page</legend>
      <label class="setting">Page size<select data-config="pageSize"><option value="letter">Letter</option><option value="a4">A4</option></select></label>
      <label class="setting">Equal margins<span class="range-wrap"><input type="range" min="32" max="96" step="2" value="60" data-margin><output>60</output></span></label>
    </fieldset>
    <fieldset><legend>Typography</legend>
      <label class="setting">Body font<select data-config="bodyFont"><optgroup label="Sans serif"><option value="inter">Inter</option><option value="inter-display">Inter Display</option><option value="source-sans-3">Source Sans 3</option><option value="fira-sans">Fira Sans</option><option value="atkinson-hyperlegible">Atkinson Hyperlegible</option><option value="alegreya-sans">Alegreya Sans</option></optgroup><optgroup label="Serif"><option value="source-serif-4">Source Serif 4</option><option value="ibm-plex-serif">IBM Plex Serif</option><option value="spectral">Spectral</option><option value="crimson-text">Crimson Text</option><option value="gentium-book-plus">Gentium Book Plus</option></optgroup><optgroup label="Monospaced"><option value="source-code-pro">Source Code Pro</option><option value="jetbrains-mono">JetBrains Mono</option><option value="fira-code">Fira Code</option><option value="ibm-plex-mono">IBM Plex Mono</option><option value="roboto-mono">Roboto Mono</option><option value="geist-mono">Geist Mono</option><option value="cascadia-mono">Cascadia Mono</option><option value="space-mono">Space Mono</option><option value="doto">Doto · dotted</option></optgroup></select></label>
      <label class="setting">Heading font<select data-config="headingFont"><optgroup label="Sans serif"><option value="inter-display">Inter Display</option><option value="inter">Inter</option><option value="source-sans-3">Source Sans 3</option><option value="fira-sans">Fira Sans</option><option value="atkinson-hyperlegible">Atkinson Hyperlegible</option><option value="alegreya-sans">Alegreya Sans</option></optgroup><optgroup label="Serif"><option value="source-serif-4">Source Serif 4</option><option value="ibm-plex-serif">IBM Plex Serif</option><option value="spectral">Spectral</option><option value="crimson-text">Crimson Text</option><option value="gentium-book-plus">Gentium Book Plus</option></optgroup><optgroup label="Monospaced"><option value="source-code-pro">Source Code Pro</option><option value="jetbrains-mono">JetBrains Mono</option><option value="fira-code">Fira Code</option><option value="ibm-plex-mono">IBM Plex Mono</option><option value="roboto-mono">Roboto Mono</option><option value="geist-mono">Geist Mono</option><option value="cascadia-mono">Cascadia Mono</option><option value="space-mono">Space Mono</option><option value="doto">Doto · dotted</option></optgroup></select></label>
      <label class="setting">Licensed/custom font<span class="font-upload"><button class="button" type="button">Add TTF files</button><input id="fontUpload" type="file" accept=".ttf,font/ttf" multiple aria-label="Add licensed or custom TrueType font files"></span></label>
      <label class="setting">Base size<span class="range-wrap"><input type="range" min="9" max="14" step="0.25" data-config="fontSize"><output></output></span></label>
      <label class="setting">Text spacing<span class="range-wrap"><input type="range" min="-0.05" max="0.15" step="0.005" data-config="bodyLetterSpacing"><output></output></span></label>
      <label class="setting">Heading spacing<span class="range-wrap"><input type="range" min="-0.05" max="0.15" step="0.005" data-config="headingLetterSpacing"><output></output></span></label>
      <label class="setting">Content width<span class="range-wrap"><input type="range" min="0.6" max="1" step="0.01" data-config="contentWidthRatio" data-format="percent"><output></output></span></label>
      <label class="setting">Line height<span class="range-wrap"><input type="range" min="1.2" max="1.8" step="0.05" data-config="lineHeight"><output></output></span></label>
      <label class="setting">Paragraph gap<span class="range-wrap"><input type="range" min="0.4" max="1.5" step="0.05" data-config="paragraphSpace"><output></output></span></label>
      <label class="setting">H1 scale<span class="range-wrap"><input type="range" min="1.5" max="2.5" step="0.05" data-config="h1Scale"><output></output></span></label>
      <label class="setting">H2 scale<span class="range-wrap"><input type="range" min="1.2" max="2" step="0.05" data-config="h2Scale"><output></output></span></label>
      <label class="setting">Bold headings<input type="checkbox" data-config="boldHeadings"></label>
      <label class="setting">Justified text<input type="checkbox" data-config="justify"></label>
      <label class="setting">Indentation<select data-config="indentStyle"><option value="off">Off</option><option value="book">Book</option><option value="all">All</option></select></label>
    </fieldset>
    <fieldset><legend>Images</legend>
      <label class="setting">Flow<select data-config="imageFlow"><option value="smart">Smart wrap</option><option value="block">Block</option></select></label>
      <label class="setting">Block alignment<select data-config="imageAlign"><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select></label>
      <label class="setting">Float side<select data-config="imageFloatSide"><option value="right">Right</option><option value="left">Left</option><option value="alternate">Alternate</option></select></label>
      <label class="setting">Float width<span class="range-wrap"><input type="range" min="0.3" max="0.58" step="0.01" data-config="imageFloatWidthRatio"><output></output></span></label>
      <label class="setting">Max height<span class="range-wrap"><input type="range" min="0.35" max="1" step="0.01" data-config="imageMaxHeightRatio"><output></output></span></label>
      <label class="setting">Gutter<span class="range-wrap"><input type="range" min="0.5" max="3" step="0.1" data-config="imageFloatGap"><output></output></span></label>
      <label class="setting">Alt captions<input type="checkbox" data-config="showImageAltAsCaption"></label>
      <label class="setting">Blank-space texture<select data-config="blankSpaceDecoration"><option value="none">None</option><option value="dot-grid">Gray dot grid</option></select></label>
    </fieldset>
    <fieldset><legend>Code</legend>
      <label class="setting">Code font<select data-config="monoFont"><option value="mono">System mono</option><option value="source-code-pro">Source Code Pro</option><option value="jetbrains-mono">JetBrains Mono</option><option value="fira-code">Fira Code</option><option value="ibm-plex-mono">IBM Plex Mono</option><option value="roboto-mono">Roboto Mono</option><option value="geist-mono">Geist Mono</option><option value="cascadia-mono">Cascadia Mono</option><option value="space-mono">Space Mono</option><option value="doto">Doto · dotted</option></select></label>
      <label class="setting">Code size<span class="range-wrap"><input type="range" min="0.7" max="1" step="0.01" data-config="codeScale"><output></output></span></label>
      <label class="setting">Code spacing<span class="range-wrap"><input type="range" min="-0.05" max="0.15" step="0.005" data-config="codeLetterSpacing"><output></output></span></label>
      <label class="setting">Code leading<span class="range-wrap"><input type="range" min="1.05" max="1.6" step="0.05" data-config="codeLineHeight"><output></output></span></label>
    </fieldset>
    <button class="button" id="resetBtn" type="button">Reset</button>
  </aside>
  <script type="module" src="./demo/dist/demo.js?v=paintdown-flow-pack-1"></script>
</body>
</html>
